bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    # 3.0 → 10.0 — at 3Hz cycle is 333ms; with WebRTC TF latency (200-700ms)
    # controller often reads stale TF. At 10Hz controller skips stale frames
    # rather than stalling on Extrapolation Error.
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    # RotationShimController wraps DWB — first rotates the robot in
    # place toward the path heading before handing off to the driving
    # controller. Quadrupeds like Go2 yaw freely but DWB alone tries to
    # drive + rotate simultaneously, which fails near doorways
    # (trajectory samples all collide with frame). The shim eliminates
    # that "stuck rotating and driving" failure mode. See
    # https://docs.nav2.org/configuration/packages/configuring-rotation-shim-controller.html
    # ULTRATHINK Plan B: DWB rejected ALL 251 trajectories on 12 successive
    # restarts despite tuning sim_time, vel limits, robot_radius, inflation,
    # voxel_layer enable/disable, and dual-map architecture. The 819→251
    # reduction confirmed our sample-count fixes were applied — but rejection
    # rate stayed 100%. Conclusion: sample-and-score model is structurally
    # incompatible with our environment (tight rooms + WebRTC TF jitter +
    # cleaned/raw map disagreement). Switching to RegulatedPurePursuit which
    # follows the global path strictly without trajectory sampling.
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # RotationShim wrapper — rotates to path heading first, then hands off
      # to RPP for path following.
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 3.2
      simulate_ahead_time: 1.0
      # RPP params — agent-recommended for Go2 indoor:
      # Tuned to match DimOS/replanning_a_star/local_planner.py PController
      # which user verified DOES patrol Go2 between rooms (no Nav2 path).
      # Key: Go2 ignores cmd_vel < 0.2 m/s — must always send ≥ 0.2.
      # User test #16 worked (passed doorway!) but two issues:
      # (1) zigzag — rotate-then-drive switching too eager.
      # (2) clipped obstacles — onboard avoidance disabled, no fallback.
      # Fix #1: bigger lookahead + raise rotate-to-heading threshold so
      # RPP smooth-drives with angular correction instead of rotate-pause-drive.
      # Fix #2: lower max velocity so user can react / no Nav2 collision check
      # but Go2 firmware still has emergency-stop on contact (slower = safer).
      desired_linear_vel: 0.3                 # was 0.55, slower for safety
      lookahead_dist: 1.0                     # was 0.6 — bigger = smoother arc
      min_lookahead_dist: 0.5
      max_lookahead_dist: 1.4
      lookahead_time: 1.5
      transform_tolerance: 1.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.20      # Go2 floor — anything below stalls
      approach_velocity_scaling_dist: 0.6
      # Stays disabled. Test #18: even with rectangular footprint + inflation
      # 0.05, RPP vetos every doorway (~60cm) because /scan walls are within
      # 5cm of footprint edge. Test #16-17: with this off, robot physically
      # navigates and passes doorway. Real obstacle safety should be a
      # SEPARATE collision_monitor node (not coupled to path-following).
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      # Smooth drive instead of rotate-pause-drive. With this OFF, RPP applies
      # angular correction continuously while driving forward → no zigzag.
      use_rotate_to_heading: false
      allow_reversing: false
      rotate_to_heading_min_angle: 1.5        # 85° — only rotate-in-place if
                                              # heading is near-backward
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      # 5 Hz is the minimum for reactive obstacle avoidance — at 0.5 m/s the
      # robot advances 10 cm per update, acceptable reaction distance for
      # pedestrians / pets. 1 Hz was a dead-man's switch (50 cm lag).
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # B: Rectangular footprint instead of circle. Go2 is 30×65cm; circular
      # robot_radius=0.20 (=40cm circle) ignored orientation → controller
      # planned through 60cm doorway as if robot were 40cm circle. With
      # rectangle, costmap knows robot orientation: 17cm half-width on
      # short side fits 60cm doorway with 13cm each side clearance.
      # Format: [[+x,+y],[+x,-y],[-x,-y],[-x,+y]] in base_link frame.
      footprint: "[[0.33, 0.17], [0.33, -0.17], [-0.33, -0.17], [-0.33, 0.17]]"
      # ULTRATHINK fix #2: re-enable voxel_layer. Local needs runtime
      # obstacles for safety. Issue earlier was static_layer:/map_clean
      # mismatch (cleaned map had shifted walls vs AMCL pose) — fixed below
      # by pointing local static to /map (raw).
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # CRITICAL fix: local uses RAW map (/map). AMCL localizes against raw
        # map; controller's local costmap MUST agree with AMCL's mental model.
        # Earlier we used /map_clean which had shifted walls (expand_free)
        # → DWB simulating from AMCL pose saw lethal cells where there
        # shouldn't be → all 819 trajectories rejected.
        # Global keeps /map_clean (planner benefits from cleaned topology).
        map_topic: /map
        map_subscribe_transient_local: True

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        observation_sources: scan
        # Footprint area always clears to free — kills the "Starting point
        # in lethal space" class of errors at source. The robot can never
        # be "in a wall" from its own perspective.
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          # CRITICAL: 0.25 m skip-zone around the lidar so Go2's own body
          # reflections (legs / head seen by the head-mounted sensor)
          # don't mark cells right under the footprint as obstacles.
          raytrace_min_range: 0.25
          obstacle_max_range: 2.5
          obstacle_min_range: 0.25

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # inflation_radius is a cost GRADIENT, not a safety barrier —
        # collision is already prevented by robot_radius in the footprint
        # check. A large radius + gentle falloff makes the planner PREFER
        # center-of-room paths but still lets it route through doorways.
        # 0.20 → 0.05 — robot reached doorway (test #18) but stopped because
        # local_costmap's 0.20m inflation around scan walls left only ~0.20m
        # clear corridor (vs 0.34m robot width). Hard collision protection
        # comes from rectangular footprint check; gradient just guides path
        # preference. Real doorways 60-65cm: with footprint 34cm + 2×5cm
        # inflation = 44cm needed — fits.
        cost_scaling_factor: 3.0
        inflation_radius: 0.05

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      # Global costmap lives in the map frame — static_layer subscribes
      # to /map from nav2_map_server. Requires AMCL publishing map→odom.
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      resolution: 0.05
      track_unknown_space: False
      static_map: True
      width: 500
      height: 500
      origin_x: -250.0 
      origin_y: -250.0
      # Circle model instead of rectangle — a quadruped yaws freely about
      # base_link, so re-checking corners at every heading makes Nav2
      # brittle in doorways. 0.34 m ≈ half-diagonal of 0.30×0.65 footprint
      # minus a sliver (doorways are 75 cm so 2×0.34=0.68 leaves 3.5 cm
      # clearance each side — tight but passable).
      footprint: "[[0.33, 0.17], [0.33, -0.17], [-0.33, -0.17], [-0.33, 0.17]]"   # match local rectangular
      # Removed voxel_layer from global_costmap. Reasoning:
      # - global_costmap is for path PLANNING (long-horizon, static features).
      # - local_costmap (with voxel_layer + /scan) handles RUNTIME obstacle
      #   avoidance in a 6m rolling window — that's where dynamic obstacles
      #   matter for the controller.
      # - With voxel_layer in global, every /scan reading gets DOUBLE-marked
      #   (once via static_layer's transient_local map, once via voxel_layer's
      #   live scan), creating spurious lethal cells around the robot that
      #   blocked SmacPlanner2D from finding paths. Removing the duplication
      #   restored planning.
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # User test #19 conclusion: cleaned map's expand_free_into_unknown=0.30m
        # widened doorways BEYOND real wall positions. Planner planned path
        # through "fake" door spot, robot's /scan saw real walls there →
        # collision. Reverting global to raw /map (single-map): doorways are
        # at real positions, planner has accurate geometry. Trade-off: raw
        # map has speckle that may complicate planning, but real-wall
        # accuracy beats fake-door corridors.
        map_topic: /map
        map_subscribe_transient_local: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # inflation_radius is a cost GRADIENT, not a safety barrier —
        # collision is already prevented by robot_radius in the footprint
        # check. A large radius + gentle falloff makes the planner PREFER
        # center-of-room paths but still lets it route through doorways.
        # scaling_factor 10 was too sharp (created cliffs DWB couldn't
        # optimize across); 3.0 is the community default for indoor.
        # Reduced from 0.40 → 0.25. With a noisy persistent_map (single-
        # cell artifacts sprinkled through free space), 0.40 inflation
        # caused artifact zones to MERGE into solid barriers completely
        # blocking the free corridor between rooms — planner returned
        # "no valid path found" even though start/goal are in free cells.
        # 0.25 = robot_radius (0.34) - tiny buffer; artifacts only merge
        # if they're within 0.5m of each other, not 0.8m.
        cost_scaling_factor: 3.0
        # 0.15 → 0.05 — when robot got physically into doorway, AMCL placed
        # it within inflation zone of cleaned map → planner refused to
        # replan ("Starting point in lethal space"). Minimal inflation 0.05
        # keeps a thin gradient for path PREFERENCE without rejecting
        # robot's actual physical position. Hard collision protection still
        # comes from robot_radius=0.30 footprint check.
        inflation_radius: 0.05

map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    # Real robot, no /clock publisher — planner must use wall clock or it
    # stalls forever waiting for ticks that never arrive.
    use_sim_time: False

    GridBased:
      # SmacPlanner2D: pure grid A*, ignores kinematic constraints.
      # The previous SmacPlannerHybrid with motion_model=REEDS_SHEPP was
      # designed for Ackermann-style cars that cannot turn in place —
      # combined with minimum_turning_radius=0.30m it refused to produce
      # plans in our ~75 cm indoor doorways, leaving bt_navigator stuck
      # in "spin as recovery" loops. Go2 is a quadruped that rotates
      # freely about base_link, so pure grid A* is both simpler and
      # strictly more permissive.
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.3                            # reach goal within 30 cm — good enough for home navigation
      downsample_costmap: false
      downsampling_factor: 1
      # Allow planning through unknown space. Go2's voxel window is only
      # 6.4 m wide; any goal further than that sits in "unknown" from
      # our perspective, and we need the planner to route through it
      # rather than refuse.
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 2.0
      smooth_path: True
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
    
lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    # Disabled controller_server, smoother_server, velocity_smoother because
    # custom_controller.py replaces them (DimOS-style pure-pursuit, works on
    # this Go2 in this house per user's prior projects). Planner stays —
    # it correctly computes /plan paths through doorways.
    node_names: ["planner_server", "behavior_server", "bt_navigator", "waypoint_follower"]
    bond_timeout: 0.0

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    # Behaviors operate in map frame so recovery (backup, spin) reasons
    # about the localized pose, not raw odom (which drifts over a session).
    global_frame: map
    robot_base_frame: base_link
    # Bumped 0.1 → 1.5 (matches controller_server) — Go2 WebRTC TF latency.
    transform_tolerance: 1.5
    # Real robot, no /clock publisher — same story as planner_server above.
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200