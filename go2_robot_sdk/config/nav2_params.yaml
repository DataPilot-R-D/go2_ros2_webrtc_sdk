bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 3.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    # RotationShimController wraps DWB — first rotates the robot in
    # place toward the path heading before handing off to the driving
    # controller. Quadrupeds like Go2 yaw freely but DWB alone tries to
    # drive + rotate simultaneously, which fails near doorways
    # (trajectory samples all collide with frame). The shim eliminates
    # that "stuck rotating and driving" failure mode. See
    # https://docs.nav2.org/configuration/packages/configuring-rotation-shim-controller.html
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      angular_dist_threshold: 0.785          # 45° — rotate first if heading > this
      forward_sampling_distance: 0.5         # look this far ahead on path for heading
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 3.2
      simulate_ahead_time: 1.0
      # DWB params — inherited by primary controller
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 3.0
      max_vel_y: 0.0
      max_vel_theta: 3.0
      min_speed_xy: 0.0
      max_speed_xy: 3.0
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 2.5
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: -2.5
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 20
      vtheta_samples: 40                     # more angular samples for tight spaces
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.3
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # Critic tuning from community consensus for tight indoor:
      # BaseObstacle low — avoids "refuses to enter doorway" by not
      # over-penalising proximity to inflation cost. PathAlign +
      # GoalAlign halved from default 32/24 → 16/16 to prevent the
      # over-rotation loop. RotateToGoal stays aggressive so final
      # yaw-to-goal is crisp.
      BaseObstacle.scale: 0.02
      PathAlign.scale: 16.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 16.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # Circle model instead of rectangle — a quadruped yaws freely about
      # base_link, so re-checking corners at every heading makes Nav2
      # brittle in doorways. 0.34 m ≈ half-diagonal of 0.30×0.65 footprint
      # minus a sliver (doorways are 75 cm so 2×0.34=0.68 leaves 3.5 cm
      # clearance each side — tight but passable).
      robot_radius: 0.34
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        observation_sources: scan
        # Footprint area always clears to free — kills the "Starting point
        # in lethal space" class of errors at source. The robot can never
        # be "in a wall" from its own perspective.
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          # CRITICAL: 0.25 m skip-zone around the lidar so Go2's own body
          # reflections (legs / head seen by the head-mounted sensor)
          # don't mark cells right under the footprint as obstacles.
          raytrace_min_range: 0.25
          obstacle_max_range: 2.5
          obstacle_min_range: 0.25

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # inflation_radius is a cost GRADIENT, not a safety barrier —
        # collision is already prevented by robot_radius in the footprint
        # check. A large radius + gentle falloff makes the planner PREFER
        # center-of-room paths but still lets it route through doorways.
        # scaling_factor 10 was too sharp (created cliffs DWB couldn't
        # optimize across); 3.0 is the community default for indoor.
        # Reduced from 0.40 → 0.25. With a noisy persistent_map (single-
        # cell artifacts sprinkled through free space), 0.40 inflation
        # caused artifact zones to MERGE into solid barriers completely
        # blocking the free corridor between rooms — planner returned
        # "no valid path found" even though start/goal are in free cells.
        # 0.25 = robot_radius (0.34) - tiny buffer; artifacts only merge
        # if they're within 0.5m of each other, not 0.8m.
        cost_scaling_factor: 3.0
        inflation_radius: 0.25

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      # Global costmap lives in the map frame — static_layer subscribes
      # to /map from nav2_map_server. Requires AMCL publishing map→odom.
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      resolution: 0.05
      track_unknown_space: False
      static_map: True
      width: 500
      height: 500
      origin_x: -250.0 
      origin_y: -250.0
      # Circle model instead of rectangle — a quadruped yaws freely about
      # base_link, so re-checking corners at every heading makes Nav2
      # brittle in doorways. 0.34 m ≈ half-diagonal of 0.30×0.65 footprint
      # minus a sliver (doorways are 75 cm so 2×0.34=0.68 leaves 3.5 cm
      # clearance each side — tight but passable).
      robot_radius: 0.34
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        observation_sources: scan
        # Same reasoning as local_costmap voxel_layer — see that block.
        footprint_clearing_enabled: true
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.25
          obstacle_max_range: 2.5
          obstacle_min_range: 0.25

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # inflation_radius is a cost GRADIENT, not a safety barrier —
        # collision is already prevented by robot_radius in the footprint
        # check. A large radius + gentle falloff makes the planner PREFER
        # center-of-room paths but still lets it route through doorways.
        # scaling_factor 10 was too sharp (created cliffs DWB couldn't
        # optimize across); 3.0 is the community default for indoor.
        # Reduced from 0.40 → 0.25. With a noisy persistent_map (single-
        # cell artifacts sprinkled through free space), 0.40 inflation
        # caused artifact zones to MERGE into solid barriers completely
        # blocking the free corridor between rooms — planner returned
        # "no valid path found" even though start/goal are in free cells.
        # 0.25 = robot_radius (0.34) - tiny buffer; artifacts only merge
        # if they're within 0.5m of each other, not 0.8m.
        cost_scaling_factor: 3.0
        inflation_radius: 0.25

map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    # Real robot, no /clock publisher — planner must use wall clock or it
    # stalls forever waiting for ticks that never arrive.
    use_sim_time: False

    GridBased:
      # SmacPlanner2D: pure grid A*, ignores kinematic constraints.
      # The previous SmacPlannerHybrid with motion_model=REEDS_SHEPP was
      # designed for Ackermann-style cars that cannot turn in place —
      # combined with minimum_turning_radius=0.30m it refused to produce
      # plans in our ~75 cm indoor doorways, leaving bt_navigator stuck
      # in "spin as recovery" loops. Go2 is a quadruped that rotates
      # freely about base_link, so pure grid A* is both simpler and
      # strictly more permissive.
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.3                            # reach goal within 30 cm — good enough for home navigation
      downsample_costmap: false
      downsampling_factor: 1
      # Allow planning through unknown space. Go2's voxel window is only
      # 6.4 m wide; any goal further than that sits in "unknown" from
      # our perspective, and we need the planner to route through it
      # rather than refuse.
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 2.0
      smooth_path: True
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
    
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    # Behaviors operate in map frame so recovery (backup, spin) reasons
    # about the localized pose, not raw odom (which drifts over a session).
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    # Real robot, no /clock publisher — same story as planner_server above.
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200